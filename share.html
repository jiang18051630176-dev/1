<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC装机助手 - 分享链接</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .share-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .qrcode-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        #qrcode {
            display: inline-block;
        }
        .url-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .url {
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
        }
        .tips {
            color: #999;
            font-size: 12px;
            line-height: 1.6;
        }
        .copy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .copy-btn:active {
            transform: translateY(0);
        }
        .features {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .features h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .features ul {
            list-style: none;
            padding: 0;
        }
        .features li {
            color: #666;
            font-size: 13px;
            padding: 5px 0;
            padding-left: 20px;
            position: relative;
        }
        .features li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="share-card">
        <div class="logo">🖥️</div>
        <h1>PC装机助手</h1>
        <p class="subtitle">智能硬件搭配 · 一键生成配置</p>

        <div class="qrcode-container">
            <div id="qrcode"></div>
        </div>

        <div class="url-box">
            <span class="url">https://reyes.zohosites.com</span>
        </div>

        <button class="copy-btn" onclick="copyUrl()">📋 复制链接</button>

        <div class="features">
            <h3>功能特色：</h3>
            <ul>
                <li>智能硬件兼容性检测</li>
                <li>一键生成装机配置单</li>
                <li>价格实时对比分析</li>
                <li>专业性能优化建议</li>
            </ul>
        </div>

        <p class="tips">
            💡 长按二维码保存图片<br>
            微信扫一扫即可访问
        </p>
    </div>

    <script>
        // 生成二维码
        new QRCode(document.getElementById("qrcode"), {
            text: "https://reyes.zohosites.com",
            width: 200,
            height: 200,
            colorDark: "#333333",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // 复制链接功能
        function copyUrl() {
            const url = 'https://reyes.zohosites.com';

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => {
                    showCopySuccess();
                }).catch(() => {
                    fallbackCopy(url);
                });
            } else {
                fallbackCopy(url);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showCopySuccess();
        }

        function showCopySuccess() {
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ 已复制';
            btn.style.background = '#28a745';

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }, 2000);
        }
    </script>
</body>
</html>
