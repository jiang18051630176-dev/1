<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<title>PC 装机助手 — 配置选择 & 性能评估</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0d1117;--bg-secondary:#161b22;--bg-tertiary:#21262d;
  --border:#30363d;--border-hover:#58a6ff;
  --text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#6e7681;
  --accent-blue:#58a6ff;--accent-green:#3fb950;--accent-yellow:#d2991d;
  --accent-orange:#f0883e;--accent-red:#f85149;
  --amd:#ED1C24;--intel:#0071C5;--nvidia:#76B900;
  --radius:8px;--radius-sm:4px;--transition:200ms ease;
  --sidebar-width:340px;
  --font-mono:'JetBrains Mono','Cascadia Code','Consolas',monospace;
  --font-sans:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);
  display:flex;height:100vh;overflow:hidden;line-height:1.5;
}
a{color:var(--accent-blue);text-decoration:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-secondary)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ===== LEFT SIDEBAR ===== */
#sidebar{
  width:var(--sidebar-width);min-width:var(--sidebar-width);
  background:var(--bg-secondary);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:10;
}
#sidebar-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);
}
#sidebar-header h1{font-size:1.25rem;font-weight:700;letter-spacing:-0.5px}
#sidebar-header h1 span{color:var(--accent-blue)}
#sidebar-header .subtitle{font-size:.75rem;color:var(--text-secondary);margin-top:2px}
#status-bar{
  display:flex;align-items:center;gap:8px;padding:10px 20px;
  background:var(--bg-tertiary);border-bottom:1px solid var(--border);font-size:.8rem;
}
#status-bar .dot{width:8px;height:8px;border-radius:50%}
#status-bar .dot.ok{background:var(--accent-green)}
#status-bar .dot.warn{background:var(--accent-yellow)}
#status-bar .dot.err{background:var(--accent-red)}
#status-bar .price{font-weight:700;font-family:var(--font-mono);margin-left:auto;font-size:.9rem}

#sections{flex:1;overflow-y:auto;padding:8px 0}
.section{
  border-bottom:1px solid var(--border);margin:0 8px;
  border-radius:var(--radius);overflow:hidden;margin-bottom:4px;
}
.section-header{
  display:flex;align-items:center;gap:8px;padding:12px 14px;
  cursor:pointer;user-select:none;transition:background var(--transition);
  font-weight:600;font-size:.9rem;
}
.section-header:hover{background:var(--bg-tertiary)}
.section-header .icon{font-size:1.1rem;width:24px;text-align:center}
.section-header .arrow{transition:transform var(--transition);margin-left:auto;color:var(--text-muted)}
.section-header .selected-badge{
  font-size:.7rem;background:var(--accent-blue);color:#000;padding:2px 8px;
  border-radius:10px;font-weight:700;display:none;white-space:nowrap;
}
.section-header .selected-badge.show{display:inline}
.section-body{max-height:600px;overflow-y:auto;transition:max-height .3s ease,padding .3s ease}
.section-body.collapsed{max-height:0;overflow:hidden}
.section-body-inner{padding:0 12px 12px}

/* Filter row */
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.filter-row label{font-size:.75rem;color:var(--text-secondary);display:flex;align-items:center;gap:3px}
.filter-btn{
  padding:3px 10px;font-size:.72rem;border:1px solid var(--border);border-radius:12px;
  background:transparent;color:var(--text-secondary);cursor:pointer;transition:all var(--transition);
  font-family:var(--font-sans);
}
.filter-btn:hover{border-color:var(--accent-blue);color:var(--text-primary)}
.filter-btn.active{background:var(--accent-blue);border-color:var(--accent-blue);color:#000;font-weight:600}

/* Component cards */
.comp-list{display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto}
.comp-card{
  padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);
  cursor:pointer;transition:all var(--transition);font-size:.8rem;
  display:flex;justify-content:space-between;align-items:center;gap:6px;
}
.comp-card:hover{border-color:var(--accent-blue);transform:translateY(-1px)}
.comp-card.selected{border-color:var(--accent-green);background:rgba(63,185,80,0.08);box-shadow:0 0 8px rgba(63,185,80,0.15)}
.comp-card.incompatible{opacity:.35;cursor:not-allowed;position:relative}
.comp-card.incompatible:hover{border-color:var(--accent-red);transform:none}
.comp-card .spec{color:var(--text-secondary);font-size:.72rem;white-space:nowrap}
.comp-card .price{font-family:var(--font-mono);font-weight:600;color:var(--accent-yellow);white-space:nowrap}
.comp-card .tag{font-size:.65rem;padding:1px 5px;border-radius:8px;background:var(--bg-tertiary);white-space:nowrap}
.comp-card.incompatible .tag{background:rgba(248,81,73,0.15);color:var(--accent-red)}
/* 多平台比价 */
.price-compare-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.price-platform-badge{font-size:.6rem;padding:1px 5px;border-radius:4px;font-family:var(--font-mono);white-space:nowrap}
.price-platform-badge.jd{background:rgba(255,50,50,0.12);color:#ff4444}
.price-platform-badge.tb{background:rgba(255,140,0,0.12);color:#ff8c00}
.price-platform-badge.pdd{background:rgba(227,28,72,0.12);color:#e31c48}
.price-platform-badge.xy{background:rgba(255,215,0,0.12);color:#ffd700}
.price-platform-badge.smzdm{background:rgba(232,54,54,0.12);color:#e83636}
.price-platform-badge.lowest{font-weight:700;border:1px solid var(--accent-green)}
.price-link{color:inherit;text-decoration:none}
.price-link:hover{text-decoration:underline}
.price-links{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.price-link-btn{display:inline-block;font-size:.7rem;padding:2px 6px;border-radius:3px;text-decoration:none;color:var(--text-primary);border:1px solid var(--border);transition:all .2s}
.price-link-btn:hover{background:var(--accent-blue);color:#000;border-color:var(--accent-blue)}
.price-source-bar{display:flex;align-items:center;gap:6px;padding:4px 14px;font-size:.68rem;color:var(--text-muted);border-top:1px solid var(--border);margin-top:2px}
.price-source-bar .dot{width:5px;height:5px;border-radius:50%}
.price-source-bar .dot.active{background:var(--accent-green)}
.price-source-bar .dot.stale{background:var(--accent-yellow)}
.price-source-bar .dot.off{background:var(--accent-red)}

.no-match{text-align:center;color:var(--text-muted);padding:20px;font-size:.8rem}

/* ===== MAIN CONTENT ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg-secondary)}
.tab-btn{
  padding:12px 24px;font-size:.85rem;font-weight:600;border:none;background:transparent;
  color:var(--text-secondary);cursor:pointer;transition:all var(--transition);
  border-bottom:2px solid transparent;font-family:var(--font-sans);
}
.tab-btn:hover{color:var(--text-primary)}
.tab-btn.active{color:var(--accent-blue);border-bottom-color:var(--accent-blue)}

#tab-content{flex:1;overflow-y:auto;padding:20px 24px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Config list */
#config-list{}
#config-list h2{font-size:1.1rem;margin-bottom:16px;font-weight:700}
.config-table{width:100%;border-collapse:collapse;font-size:.85rem}
.config-table th,.config-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.config-table th{color:var(--text-secondary);font-weight:600;font-size:.75rem;text-transform:uppercase}
.config-table .empty-row td{color:var(--text-muted);font-style:italic;text-align:center;padding:16px}
.config-table .category{font-weight:600;color:var(--accent-blue)}
.config-total{
  text-align:right;margin-top:16px;font-size:1.3rem;font-weight:700;
  font-family:var(--font-mono);
}
.config-total span{color:var(--accent-green)}

/* Performance section */
#perf-content h2{font-size:1.1rem;margin-bottom:6px;font-weight:700}
#perf-content .section-desc{color:var(--text-secondary);font-size:.8rem;margin-bottom:20px}
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px}
.perf-card{
  background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;transition:border-color var(--transition);
}
.perf-card:hover{border-color:var(--accent-blue)}
.perf-card h3{font-size:.85rem;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.perf-card table{width:100%;font-size:.78rem;border-collapse:collapse}
.perf-card th{color:var(--text-secondary);font-weight:500;font-size:.7rem;padding:4px 6px;border-bottom:1px solid var(--border)}
.perf-card td{text-align:center;padding:4px 6px;font-family:var(--font-mono);font-weight:600}
.perf-card .rating{font-size:.7rem;padding:2px 6px;border-radius:8px;font-weight:600}
.rating-s{background:rgba(212,153,29,0.2);color:#f0c040}
.rating-a{background:rgba(63,185,80,0.2);color:var(--accent-green)}
.rating-b{background:rgba(63,185,80,0.1);color:#7ee787}
.rating-c{background:rgba(210,153,29,0.15);color:var(--accent-yellow)}
.rating-d{background:rgba(240,136,62,0.15);color:var(--accent-orange)}
.rating-f{background:rgba(248,81,73,0.15);color:var(--accent-red)}
.perf-card .rec{font-size:.72rem;color:var(--text-secondary);margin-top:8px;font-style:italic}

/* AI section */
.ai-card{
  background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;margin-top:8px;
}
.ai-card h3{font-size:.95rem;margin-bottom:12px}
.ai-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.ai-spec{font-size:.8rem;color:var(--text-secondary)}
.ai-spec strong{color:var(--text-primary)}
.ai-models{font-size:.78rem}
.ai-models table{width:100%;border-collapse:collapse;margin-top:8px}
.ai-models th,.ai-models td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:left}
.ai-models .ok{color:var(--accent-green)}
.ai-models .warn{color:var(--accent-yellow)}
.ai-models .no{color:var(--accent-red)}
.ai-speed{font-size:.85rem;margin-top:12px;padding:12px;background:var(--bg-tertiary);border-radius:var(--radius-sm)}
.ai-speed strong{color:var(--accent-green);font-family:var(--font-mono)}

/* Tools */
.btn{
  padding:8px 16px;font-size:.8rem;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;transition:all var(--transition);
  font-family:var(--font-sans);
}
.btn:hover{border-color:var(--accent-blue);color:var(--accent-blue)}
.btn.primary{background:var(--accent-blue);border-color:var(--accent-blue);color:#000;font-weight:600}
.btn.primary:hover{opacity:.85}
.toolbar{display:flex;gap:8px;margin-bottom:16px}

/* Incompatible tooltip */
[data-tooltip]{position:relative}
[data-tooltip]:hover::after{
  content:attr(data-tooltip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#000;color:#fff;padding:4px 10px;
  border-radius:4px;font-size:.7rem;white-space:nowrap;z-index:100;
  pointer-events:none;border:1px solid var(--border);
}

/* Freshness & used markers */
.price-age{font-size:.58rem;padding:1px 4px;border-radius:6px;white-space:nowrap}
.price-age.fresh{background:rgba(63,185,80,0.15);color:var(--accent-green)}
.price-age.stale{background:rgba(210,153,29,0.15);color:var(--accent-yellow)}
.price-age.old{background:rgba(248,81,73,0.15);color:var(--accent-red)}
.used-badge{font-size:.58rem;padding:1px 5px;border-radius:6px;background:rgba(240,136,62,0.2);color:var(--accent-orange);margin-left:3px}
#progress-bar-wrap{display:none;height:3px;background:var(--border);margin:4px 20px;border-radius:2px}
#progress-bar-wrap.show{display:block}
#progress-bar{height:100%;background:var(--accent-blue);border-radius:2px;transition:width .3s;width:0}
.toggle-row{display:flex;gap:8px;margin:8px 0;font-size:.7rem;align-items:center}
.toggle-btn{padding:3px 10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:.7rem}
.toggle-btn.active{background:var(--accent-blue);color:#000;font-weight:600}
.price-platform{font-size:.62rem;color:var(--text-muted);margin-left:4px}

/* Responsive */
@media(max-width:900px){
  body{flex-direction:column}
  #sidebar{width:100%;min-width:100%;max-height:45vh}
  #main{height:55vh}
  .perf-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h1>🖥️ <span>PC</span> 装机助手</h1>
    <div class="subtitle">逐项选择配件 · 自动兼容检查 · 性能评估</div>
  </div>
  <div id="status-bar">
    <span class="dot ok" id="status-dot"></span>
    <span id="status-text">待选择配件</span>
    <button id="refresh-btn" onclick="refreshPrices()" style="margin-left:8px;padding:2px 10px;font-size:.7rem;background:var(--accent-blue);color:#000;border:none;border-radius:10px;cursor:pointer;font-weight:700">🔄 刷新价格</button>
    <span class="price" id="total-price">¥0</span>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div class="toggle-row" style="padding:4px 12px">
    <span style="color:var(--text-muted)">显示:</span>
    <button class="toggle-btn active" onclick="setPriceMode('all')" id="toggle-all">全部</button>
    <button class="toggle-btn" onclick="setPriceMode('new')" id="toggle-new">全新</button>
    <button class="toggle-btn" onclick="setPriceMode('used')" id="toggle-used">含二手</button>
  </div>
  <div id="sections">
    <!-- Dynamically populated -->
  </div>
</aside>

<!-- ===== MAIN ===== -->
<main id="main">
  <div id="tabs">
    <button class="tab-btn active" data-tab="config">🛒 配置清单</button>
    <button class="tab-btn" data-tab="perf">📊 性能评估</button>
  </div>
  <div id="tab-content">
    <div class="tab-panel active" id="panel-config">
      <div class="toolbar">
        <button class="btn" onclick="resetAll()">🔄 重置全部</button>
        <button class="btn" onclick="exportConfig()">📋 复制清单</button>
      </div>
      <div id="config-list"></div>
    </div>
    <div class="tab-panel" id="panel-perf" style="display:none">
      <div id="perf-content">

      </div>
    </div>
  </div>
</main>

const PRICE_CACHE_KEY = 'pc_builder_prices_v3';
const PRICE_CACHE_TIME = 1800000; // 30分钟缓存

// 平台名称映射
const PLATFORM_MAP = {
  '京东': 'jd', '淘宝': 'tb', '拼多多': 'pdd', '闲鱼': 'xy', '什么值得买': 'smzdm'
};
const PLATFORM_LABELS = { jd:'京东', tb:'淘宝', pdd:'拼多多', xy:'闲鱼', smzdm:'值得买' };

var EMBEDDED_PRICES = null;

async function loadPrices() {
  // Step 1: 加载基础 prices.json
  try {
    const resp = await fetch('prices.json?_=' + Date.now(), { cache: 'no-store' });
    if (resp.ok) {
      const data = await resp.json();
      mergeStaticPrices(data);
      pricesUpdateTime = data.updated || new Date().toISOString();
      console.log('✅ 基础价格已加载');
    }
  } catch(e) {
    console.log('⚠️ 价格文件加载失败: ' + e.message + ' (使用默认价格)');
  }

  // Step 2: 从 Python 服务器加载多平台实时价格
  await loadMultiPlatformPrices();
  
  renderAll();
}

async function loadMultiPlatformPrices() {
  const API_URLS = [
    'https://raw.githubusercontent.com/jiang18051630176-dev/1/main/prices.json',
    'prices.json'  // 兜底静态数据
  ];
  let data = null;

  for (const url of API_URLS) {
    try {
      const resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
      if (resp.ok) { data = await resp.json(); break; }
    } catch(e) { console.log('⚠️ ' + url + ': ' + e.message); }
  }

  if (!data) { console.log('ℹ️ 使用默认价格数据'); return; }

  try {
    // 更新平台状态
    if (data.sources) {
      data.sources.forEach(s => {
        const key = PLATFORM_MAP[s];
        if (key) priceSourceStatus[key] = 'active';
      });
    }

    // 构建多平台价格索引
    multiPlatformPrices = {};
    if (data.parts) {
      Object.entries(data.parts).forEach(([partType, items]) => {
        if (!multiPlatformPrices[partType]) multiPlatformPrices[partType] = {};
        items.forEach(item => {
          // 按平台分组
          if (item.platforms) {
            item.platforms.forEach(p => {
              const pKey = PLATFORM_MAP[p.platform] || p.platform;
              if (!multiPlatformPrices[partType][item.name]) {
                multiPlatformPrices[partType][item.name] = {};
              }
              multiPlatformPrices[partType][item.name][pKey] = {
                price: p.price,
                shop: p.shop || '',
                url: p.url || '',
              };
            });
          }
        });
      });
    }

    // 合并实时价格到 HARDWARE
    mergeMultiPlatformPrices();

    pricesUpdateTime = data.updated || new Date().toISOString();
    console.log('✅ 多平台实时价格已加载');
  } catch(e) {
    console.log('⚠️ 多平台价格加载失败: ' + e.message);
  }
}

function mergeMultiPlatformPrices() {
  // 遍历 multiPlatformPrices，将最低价更新到 HARDWARE
  const partMap = { 'cpu': 'cpus', 'gpu': 'gpus', 'mobo': 'mobos', 'ram': 'rams', 'storage': 'storages', 'psu': 'psus', 'case': 'cases', 'cooler': 'coolers' };
  
  Object.entries(multiPlatformPrices).forEach(([mpType, items]) => {
    const hwKey = partMap[mpType];
    if (!hwKey || !HARDWARE[hwKey]) return;
    
    Object.entries(items).forEach(([searchName, platforms]) => {
      // 模糊匹配 HARDWARE 中的配件
      const searchLower = searchName.toLowerCase();
      HARDWARE[hwKey].forEach(hw => {
        const hwLower = hw.name.toLowerCase();
        const hwIdLower = hw.id.toLowerCase();
        
        // 多级匹配策略
        let matched = false;
        
        // 1. ID关键词匹配
        const idParts = hw.id.split('-');
        matched = idParts.some(p => p.length > 3 && searchLower.includes(p));
        
        // 2. 名称关键词匹配 (品牌+型号)
        if (!matched) {
          const nameTokens = hwLower.split(' ').filter(t => t.length > 2);
          matched = nameTokens.length >= 2 && nameTokens.every(t => searchLower.includes(t));
        }
        
        // 3. 容量/规格匹配
        if (!matched && (hwKey === 'rams' || hwKey === 'storages')) {
          if (hw.capacity && searchLower.includes(String(hw.capacity))) matched = true;
          if (hw.type && searchLower.includes(hw.type)) matched = true;
        }
        
        if (matched) {
          // 初始化或更新 platformPrices
          if (!hw._platformPrices) hw._platformPrices = {};
          Object.entries(platforms).forEach(([pKey, info]) => {
            if (!hw._platformPrices[pKey] || hw._platformPrices[pKey].price > info.price) {
              hw._platformPrices[pKey] = info;
            }
          });
          
          // 更新最低价
          const prices = Object.values(platforms).map(p => p.price).filter(p => p > 0);
          if (prices.length > 0) {
            const minPrice = Math.min(...prices);
            if (!hw._liveLowest || hw._liveLowest > minPrice) {
              hw._liveLowest = minPrice;
              hw._liveSource = Object.keys(platforms).find(k => platforms[k].price === minPrice) || '';
            }
          }
        }
      });
    });
  });
  
  // 更新价格源状态
  Object.keys(priceSourceStatus).forEach(k => {
    if (priceSourceStatus[k] === 'active') priceSourceStatus[k] = 'active';
    else if (priceSourceStatus[k] !== 'active') priceSourceStatus[k] = 'off';
  });
}

// 手动刷新 — 触发全量抓取 + 重新加载
async function refreshPrices() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '⏳ 抓取中...';
  btn.disabled = true;

  const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
  
  if (isLocal) {
    // 触发 Python 服务器后台抓取
    try {
      const scrapeResp = await fetch('/api/scrape?platform=all', { signal: AbortSignal.timeout(10000) });
      if (scrapeResp.ok) {
        const status = await scrapeResp.json();
        console.log('✅ 全平台抓取已启动:', status.message);
        
        // 轮询等待抓取完成
        btn.textContent = '⏳ 爬取中(京东/淘宝/拼多多/闲鱼)...';
        let pollCount = 0;
        while (pollCount < 60) { // 最多等2分钟
          await new Promise(r => setTimeout(r, 2000));
          try {
            const statusResp = await fetch('/api/scrape/status', { signal: AbortSignal.timeout(5000) });
            if (statusResp.ok) {
              const s = await statusResp.json();
              if (!s.running) {
                console.log('✅ 爬取完成:', s.results);
                updateSourceBar();
                break;
              }
              btn.textContent = `⏳ 抓取中... ${Math.floor((pollCount+1)*2)}s`;
            }
          } catch(e) {}
          pollCount++;
        }
      }
    } catch(e) { console.log('⚠️ 抓取触发失败: ' + e.message); }
    
    // 重新加载多平台数据
    await loadMultiPlatformPrices();
  }

  // 重载 prices.json
  try {
    const resp = await fetch('prices.json?t=' + Date.now(), { cache: 'no-cache' });
    if (resp.ok) {
      const data = await resp.json();
      mergeStaticPrices(data);
    }
  } catch(e) {}

  renderAll();
  btn.textContent = '🔄 实时抓取';
  btn.disabled = false;
  updateSourceBar();
}

// 在页面加载时显示刷新按钮
function showRefreshButton() {
  const btn = document.getElementById('refresh-btn');
  btn.style.display = 'inline';
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    btn.textContent = '🔄 实时抓取';

    btn.textContent = '🔄 刷新';

}

    const sidebar = document.getElementById('sidebar');

  }
  const dots = Object.entries(PLATFORM_LABELS).map(([k, label]) => {
    const status = priceSourceStatus[k] || 'off';
    return `<span class="dot ${status}"></span> ${label}`;
  }).join(' ');
  bar.innerHTML = `数据源: ${dots}`;
}

// 合并静态 JSON 价格
function mergeStaticPrices(data) {
  // 直接更新 HARDWARE 对象中所有配件的价格
  // 先按ID匹配，匹配不到则按类型+容量+品牌模糊匹配
  ['cpus','gpus','mobos','rams','storages','psus','cases','coolers'].forEach(cat => {
    if (!data[cat]) return;
    if (!HARDWARE[cat]) return;

    data[cat].forEach(ext => {
      // 1. 精确ID匹配
      let existing = HARDWARE[cat].find(h => h.id === ext.id);

      // 2. 模糊匹配: 内存按 type+capacity, 存储按 type+capacity
      if (!existing && cat === 'rams') {
        existing = HARDWARE[cat].find(h => h.type === ext.type && h.capacity === ext.capacity);
      }
      if (!existing && cat === 'storages') {
        existing = HARDWARE[cat].find(h => h.type === ext.type && h.capacity === ext.capacity);
      }
      // 3. CPU/GPU 按品牌+近似价格匹配
      if (!existing && (cat === 'cpus' || cat === 'gpus')) {
        existing = HARDWARE[cat].find(h => h.brand === ext.brand && Math.abs(h.price - ext.price) < ext.price * 0.5);
      }

      if (existing) {
        existing.price = ext.price;
        if (ext.priceUsed != null) existing.priceUsed = ext.priceUsed;
        if (ext.rec) existing.rec = ext.rec;
        if (ext.src) existing.src = ext.src;
      }
    });
  });

  // 额外: 用 IC交易网 内存条数据直接更新
  if (data.rams && HARDWARE.rams) {
    const ramsByType = {};
    data.rams.forEach(r => {
      const key = r.type + '_' + r.capacity;
      if (!ramsByType[key]) ramsByType[key] = r;
    });
    HARDWARE.rams.forEach(hw => {
      const key = hw.type + '_' + hw.capacity;
      if (ramsByType[key]) {
        hw.price = ramsByType[key].price;
        if (ramsByType[key].priceUsed) hw.priceUsed = ramsByType[key].priceUsed;
        hw.src = ramsByType[key].src || 'IC交易网';
      }
    });
  }

  // 额外: 用 IC交易网 SSD 数据直接更新
  if (data.storages && HARDWARE.storages) {
    const ssdByCap = {};
    data.storages.forEach(s => {
      const key = s.type + '_' + s.capacity;
      if (!ssdByCap[key]) ssdByCap[key] = s;
    });
    HARDWARE.storages.forEach(hw => {
      const key = hw.type + '_' + hw.capacity;
      if (ssdByCap[key]) {
        hw.price = ssdByCap[key].price;
        if (ssdByCap[key].priceUsed) hw.priceUsed = ssdByCap[key].priceUsed;
        hw.src = ssdByCap[key].src || 'IC交易网';
      }
    });
  }
}

// =====================================================================
// PRICE HISTORY GENERATOR — 模拟30天价格走势
// =====================================================================
function generatePriceHistory(basePrice, volatility = 0.015, days = 30) {
  const history = [];
  let price = basePrice;
  const now = new Date();
  for (let i = days; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0, 10);
    const change = (Math.random() - 0.48) * volatility * price;
    price = Math.round(Math.max(price * 0.85, Math.min(price * 1.15, price + change)));
    history.push({ date: dateStr, price });
  }
  return history;
}

// Cache for generated histories
const priceHistoryCache = {};

function getPriceHistory(itemId, category) {
  const cacheKey = category + '_' + itemId;
  if (priceHistoryCache[cacheKey]) return priceHistoryCache[cacheKey];
  const item = HARDWARE[category]?.find(h => h.id === itemId);
  if (!item) return [];
  const history = generatePriceHistory(item.price, category === 'gpus' ? 0.02 : 0.012);
  priceHistoryCache[cacheKey] = history;
  return history;
}

// =====================================================================
// PRICE CHART — Canvas 价格走势图
// =====================================================================
let chartState = { product1: null, product2: null, days: 30, cat1: null, cat2: null };

function drawPriceChart(canvasId, product1, cat1, product2, cat2, days) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 20, right: 20, bottom: 40, left: 60 };
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, W, H);

  // Get data
  const data1 = product1 ? getPriceHistory(product1, cat1).slice(-days) : [];
  const data2 = product2 ? getPriceHistory(product2, cat2).slice(-days) : [];
  const allData = [...data1, ...data2];
  if (!allData.length) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('请选择产品进行对比', W/2, H/2);
    return;
  }

  const prices = allData.map(d => d.price);
  let yMin = Math.min(...prices) * 0.9;
  let yMax = Math.max(...prices) * 1.1;
  const yRange = yMax - yMin || 1;

  function xOf(i) { return pad.left + (i / (days - 1 || 1)) * pw; }
  function yOf(p) { return pad.top + (1 - (p - yMin) / yRange) * ph; }

  // Grid lines
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i / 4) * ph;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const val = Math.round(yMax - (i / 4) * yRange);
    ctx.fillStyle = '#8b949e';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('¥' + val.toLocaleString(), pad.left - 6, y + 4);
  }

  // X-axis labels
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8b949e';
  ctx.font = '9px monospace';
  const step = Math.max(1, Math.floor(days / 6));
  for (let i = 0; i < days; i += step) {
    if (data1[i] || data2[i]) {
      const d = data1[i] || data2[i];
      ctx.fillText(d.date.slice(5), xOf(i), H - pad.bottom + 16);
    }
  }

  // Draw lines
  function drawLine(data, color, dashed) {
    if (!data.length) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    if (dashed) ctx.setLineDash([5, 3]);
    else ctx.setLineDash([]);
    ctx.beginPath();
    data.forEach((d, i) => {
      const x = xOf(i), y = yOf(d.price);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.setLineDash([]);

    // Dots
    data.forEach((d, i) => {
      if (i % Math.max(1, Math.floor(days / 10)) === 0 || i === data.length - 1) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(xOf(i), yOf(d.price), 3, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  }

  if (data1.length) drawLine(data1, '#58a6ff', false);
  if (data2.length) drawLine(data2, '#3fb950', true);

  // Legend
  const item1 = product1 ? HARDWARE[cat1]?.find(h => h.id === product1) : null;
  const item2 = product2 ? HARDWARE[cat2]?.find(h => h.id === product2) : null;
  let legendY = pad.top + 4;
  ctx.font = '11px sans-serif';
  if (item1) {
    ctx.fillStyle = '#58a6ff';
    ctx.textAlign = 'left';
    ctx.fillText('━ ' + item1.name.slice(0, 25), pad.left + 4, legendY);
    legendY += 16;
  }
  if (item2) {
    ctx.fillStyle = '#3fb950';
    ctx.fillText('┅ ' + item2.name.slice(0, 25), pad.left + 4, legendY);
  }
}

function updateChart() {
  drawPriceChart('price-chart', chartState.product1, chartState.cat1, chartState.product2, chartState.cat2, chartState.days);
}

// =====================================================================
// STATE
// =====================================================================
let state = {
  cpu: null, gpu: null, mobo: null, ram: null,
  storage: null, psu: null, case: null, cooler: null,
  cpuBrand: 'all', cpuTier: 'all',
  gpuBrand: 'all', gpuTier: 'all',
  moboTier: 'all', moboFF: 'all',
  ramCap: 'all', ramTier: 'all',
  storageType: 'all', storageTier: 'all',
  psuTier: 'all',
  caseTier: 'all',
  coolerType: 'all', coolerTier: 'all',
};

// =====================================================================
// RENDER ENGINE
// =====================================================================
function getFiltered(parts, key, section) {
  let list = [...HARDWARE[parts]];
  const s = section;

  // ---- CPU ----
  if (parts === 'cpus') {
    if (state.cpuBrand !== 'all') list = list.filter(c => c.brand === state.cpuBrand);
    if (state.cpuTier !== 'all') list = list.filter(c => c.tier === state.cpuTier);
  }

  // ---- GPU ----
  if (parts === 'gpus') {
    if (state.gpuBrand !== 'all') list = list.filter(g => g.brand === state.gpuBrand);
    if (state.gpuTier !== 'all') list = list.filter(g => g.tier === state.gpuTier);
  }

  // ---- Motherboard (compatibility) ----
  if (parts === 'mobos') {
    if (state.moboTier !== 'all') list = list.filter(m => m.tier === state.moboTier);
    if (state.moboFF !== 'all') list = list.filter(m => m.ff === state.moboFF);
    // CPU compatibility: SHOW ALL, mark compatible/incompatible
    if (state.cpu) {
      const cpu = state.cpu;
      list.forEach(m => {
        m._compat = (m.socket === cpu.socket)
          && !(cpu.tdp > 125 && m.vrm === 'low')
          && !(cpu.tdp > 180 && m.vrm !== 'high')
          && !(cpu.tier === 'flagship' && m.tdpMax < 200);
        // Build tooltip for incompatible
        if (!m._compat) {
          const reasons = [];
          if (m.socket !== cpu.socket) reasons.push(`插槽不匹配 (需${cpu.socket})`);
          if (cpu.tdp > m.tdpMax) reasons.push(`供电不足 (CPU ${cpu.tdp}W > 主板${m.tdpMax}W)`);
          m._tooltip = reasons.join('；');
        }
      });
    } else {
      list.forEach(m => { m._compat = true; m._tooltip = ''; });
    }
  }

  // ---- RAM (motherboard compatibility) ----
  if (parts === 'rams') {
    if (state.ramCap !== 'all') list = list.filter(r => r.capacity === parseInt(state.ramCap));
    if (state.ramTier !== 'all') list = list.filter(r => r.tier === state.ramTier);
    // Show all RAM, mark compatibility based on mobo
    if (state.mobo) {
      const need = state.mobo.ramType;
      list.forEach(r => {
        r._compat = r.type === need;
        if (!r._compat) r._tooltip = `需要 ${need.toUpperCase()} 内存 (当前${r.type.toUpperCase()})`;
      });
    } else {
      list.forEach(r => { r._compat = true; r._tooltip = ''; });
    }
  }

  // ---- Storage ----
  if (parts === 'storages') {
    if (state.storageType !== 'all') list = list.filter(s => s.type === state.storageType);
    if (state.storageTier !== 'all') list = list.filter(s => s.tier === state.storageTier);
  }

  // ---- PSU (wattage recommendation) ----
  if (parts === 'psus') {
    if (state.psuTier !== 'all') list = list.filter(p => p.tier === state.psuTier);
    // Calculate recommended wattage
    const cpuTdp = state.cpu ? state.cpu.tdp : 0;
    const gpuTdp = state.gpu ? state.gpu.tdp : 0;
    const recWatt = Math.ceil(((cpuTdp + gpuTdp) * 1.5 + 100) / 50) * 50;
    list.forEach(p => { p._recWatt = recWatt; p._enough = p.watt >= recWatt; });
  }

  // ---- Case (mobo FF + GPU length) ----
  if (parts === 'cases') {
    if (state.caseTier !== 'all') list = list.filter(c => c.tier === state.caseTier);
    list.forEach(c => {
      c._compat = true;
      const issues = [];
      if (state.mobo) {
        // ATX case fits all, mATX case only fits mATX/ITX
        if (c.ff === 'mATX' && state.mobo.ff === 'ATX') {
          c._compat = false;
          issues.push('机箱仅支持mATX(主板为ATX)');
        }
      }
      c._tooltip = issues.join('；');
    });
  }

  // ---- Cooler (CPU TDP) ----
  if (parts === 'coolers') {
    if (state.coolerType !== 'all') list = list.filter(c => c.type === state.coolerType);
    if (state.coolerTier !== 'all') list = list.filter(c => c.tier === state.coolerTier);
    if (state.cpu) {
      list.forEach(c => { c._enoughTdp = c.tdpMax >= state.cpu.tdp; });
    } else {
      list.forEach(c => { c._enoughTdp = true; });
    }
  }

  return list;
}

function renderCompCard(item, section, parts) {
  let spec = '', price = item.price, compat = true, tooltip = '';

  // Unified compatibility check
  if (item._compat === false) { compat = false; tooltip = item._tooltip || '不兼容'; }

  switch(parts) {
    case 'cpus':
      spec = `${item.cores} | ${item.tdp}W | ${item.socket}`;
      break;
    case 'gpus':
      spec = `${item.vram}GB ${item.vramType} | ${item.busWidth}-bit | ${item.bw} GB/s | ${item.tdp}W`;
      break;
    case 'mobos':
      spec = `${item.chipset} | ${item.ramType.toUpperCase()} | ${item.ff} | VRM:${item.vrm}`;
      break;
    case 'rams':
      spec = `DDR${item.type === 'ddr5' ? '5' : '4'} | ${item.speed}MHz`;
      break;
    case 'storages':
      spec = item.speed;
      break;
    case 'psus':
      spec = `${item.watt}W | ${item.cert} | ${item.modular}${item.atx31 ? ' | ATX3.1' : ''}`;
      if (item._enough === false) { compat = false; tooltip = `建议 ≥ ${item._recWatt}W`; }
      break;
    case 'cases':
      spec = `GPU≤${item.gpuLen}mm | 散热≤${item.coolerH}mm | ${item.ff}`;
      break;
    case 'coolers':
      spec = `解热 ${item.tdpMax}W | ${item.type === 'air' ? '风冷' : item.type === 'aio240' ? '240水冷' : '360水冷'}`;
      if (item._enoughTdp === false) { compat = false; tooltip = `解热能力不足 (CPU ${state.cpu?.tdp || '?'}W > 散热${item.tdpMax}W)`; }
      break;
  }

  const key = parts.slice(0, -1); // 'cpus' -> 'cpu'
  const isSelected = state[key] && state[key].id === item.id;
  const cls = ['comp-card', isSelected ? 'selected' : '', !compat ? 'incompatible' : ''].filter(Boolean).join(' ');
  // Price display: show new price, + used price if available
  // Multi-platform price: show best price + platform indicator
  let priceDisplay;
  if (item._platforms && item._platforms.length) {
    const best = item._platforms.reduce((a,b) => a.price < b.price ? a : b);
    const hasXY = item._platforms.some(p => p.isUsed);
    priceDisplay = `<span class="price">¥${best.price.toLocaleString()}</span>
      <span class="price-platform">${best.platform}</span>
      ${hasXY ? '<span class="used-badge">二手</span>' : ''}`;
  } else if (item.priceUsed) {
    priceDisplay = `<span class="price">¥${item.price.toLocaleString()}</span>
      <span style="font-size:.65rem;color:var(--text-muted);font-family:var(--font-mono)">二手 ¥${item.priceUsed.toLocaleString()}</span>`;
  } else {
    priceDisplay = `<span class="price">¥${item.price.toLocaleString()}</span>`;
  }

  // Age badge
  let ageBadge = '';
  if (pricesUpdateTime) {
    const ageDays = Math.floor((Date.now() - new Date(pricesUpdateTime).getTime()) / 86400000);
    if (ageDays >= 0) {
      const cls = ageDays > 14 ? 'old' : ageDays > 7 ? 'stale' : 'fresh';
      const label = ageDays === 0 ? '今日' : ageDays + '天前';
      ageBadge = `<span class="price-age ${cls}">${label}</span>`;
    }
  }

  // 多平台实时比价标记
  let platformBadges = '';
  if (item._platformPrices) {
    const platforms = Object.entries(item._platformPrices);
    if (platforms.length > 0) {
      // 找出最低价平台
      let lowestPlatform = null, lowestPrice = Infinity;
      platforms.forEach(([pKey, info]) => {
        if (info.price > 0 && info.price < lowestPrice) {
          lowestPrice = info.price;
          lowestPlatform = pKey;
        }
      });

      platformBadges = '<div class="price-compare-row">' +
        platforms.slice(0, 4).map(([pKey, info]) => {
          const label = PLATFORM_LABELS[pKey] || pKey;
          const isLowest = pKey === lowestPlatform;
          // 添加购买链接
          const linkHtml = info.url ?
            `<a href="${info.url}" target="_blank" class="price-link" onclick="event.stopPropagation()" title="${info.shop || label}">¥${info.price}</a>` :
            `<span title="${info.shop || label}">¥${info.price}</span>`;
          return `<span class="price-platform-badge ${pKey}${isLowest ? ' lowest' : ''}">${label} ${linkHtml}</span>`;
        }).join('') +
        '</div>';
    }
  }

  return `<div class="${cls}" data-id="${item.id}" data-tooltip="${tooltip}" onclick="selectPart('${key}','${item.id}')">
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.name}</div>
      <div class="spec">${spec}</div>
      ${platformBadges}
    </div>
    <span class="tag">${item.tier === 'flagship' ? '旗舰' : item.tier === 'high' ? '高端' : item.tier === 'mid' ? '中端' : '入门'}</span>
    ${item.rec ? `<span style="font-size:.65rem;color:var(--accent-yellow);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${item.rec}">${item.rec.slice(0,10)}</span>` : ''}
    ${ageBadge}
    ${priceDisplay}
  </div>`;
}

function renderSection(s) {
  const el = document.getElementById('section-' + s.key);
  if (!el) return;
  const list = getFiltered(s.parts, s.key, s);
  const body = el.querySelector('.comp-list');
  if (list.length === 0) {
    body.innerHTML = '<div class="no-match">没有匹配的配件<br><small>请调整过滤条件或上游选择</small></div>';
  } else {
    body.innerHTML = list.map(item => renderCompCard(item, s, s.parts)).join('');
  }
  // Update selected badge
  const badge = el.querySelector('.selected-badge');
  const stateKey = s.key === 'storage' ? 'storage' : s.key === 'case' ? 'case' : s.key === 'cooler' ? 'cooler' : s.key;
  const sel = state[stateKey];
  if (sel) { badge.textContent = sel.name.length > 18 ? sel.name.slice(0,16)+'…' : sel.name; badge.classList.add('show'); }
  else badge.classList.remove('show');
}

function renderAll() {
  SECTIONS.forEach(s => renderSection(s));
  updateStatus();
  renderConfigList();
  renderPerformance();
}

// =====================================================================
// SELECTION LOGIC
// =====================================================================
function selectPart(key, id) {
  const partsMap = { cpu:'cpus', gpu:'gpus', mobo:'mobos', ram:'rams', storage:'storages', psu:'psus', case:'cases', cooler:'coolers' };
  const list = HARDWARE[partsMap[key]];
  const item = list.find(i => i.id === id);
  if (!item) return;

  // Check compatibility
  if (item._compat === false) return;
  if (item._enough === false) return;   // PSU wattage
  if (item._enoughTdp === false) return; // Cooler TDP

  // Toggle or set
  if (state[key] && state[key].id === id) {
    state[key] = null;
  } else {
    state[key] = item;
    // Cascade clear: upstream change clears downstream
    if (key === 'cpu') { state.mobo = null; state.ram = null; state.cooler = null; }
    if (key === 'mobo') { state.ram = null; }
  }
  renderAll();
}

// =====================================================================
// FILTER HANDLERS
// =====================================================================
function setFilter(section, filterKey, value) {
  state[filterKey] = value;
  // Update filter buttons
  const el = document.getElementById('section-' + section);
  if (el) {
    el.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.val === value);
    });
  }
  renderAll();
}

// =====================================================================
// STATUS & TOTAL
// =====================================================================
function updateStatus() {
  const parts = ['cpu','gpu','mobo','ram','storage','psu','case','cooler'];
  const selected = parts.filter(k => state[k] !== null);
  const total = selected.reduce((sum, k) => sum + state[k].price, 0);

  // Compatibility check
  let statusClass = 'ok', statusText = '';
  if (selected.length === 0) { statusText = '待选择配件'; }
  else if (selected.length < 8) { statusText = `已选 ${selected.length}/8 项`; }
  else { statusText = '✅ 全部已选'; statusClass = 'ok'; }

  // Check for issues
  if (state.cpu && state.mobo) {
    if (state.cpu.socket !== state.mobo.socket) { statusClass = 'err'; statusText = '❌ CPU与主板不兼容'; }
    else if (state.cpu.tdp > state.mobo.tdpMax) { statusClass = 'warn'; statusText = '⚠️ 主板供电可能不足'; }
  }
  if (state.mobo && state.ram) {
    const need = state.mobo.ramType === 'ddr5' ? 'ddr5' : 'ddr4';
    if (state.ram.type !== need) { statusClass = 'err'; statusText = '❌ 内存类型不兼容'; }
  }
  if (state.cpu && state.gpu && state.psu) {
    const rec = Math.ceil(((state.cpu.tdp + state.gpu.tdp) * 1.5 + 100) / 50) * 50;
    if (state.psu.watt < rec) { statusClass = 'warn'; statusText = `⚠️ 电源建议≥${rec}W`; }
  }
  if (state.cpu && state.cooler) {
    if (state.cooler.tdpMax < state.cpu.tdp) { statusClass = 'warn'; statusText = '⚠️ 散热器解热能力不足'; }
  }
  if (state.mobo && state.case) {
    if (state.case.ff === 'mATX' && state.mobo.ff === 'ATX') { statusClass = 'err'; statusText = '❌ 机箱不兼容主板板型'; }
  }

  document.getElementById('status-dot').className = 'dot ' + statusClass;
  document.getElementById('status-text').textContent = statusText;
  document.getElementById('total-price').textContent = '¥' + total.toLocaleString();
}

// =====================================================================
// CONFIG LIST (Tab 1)
// =====================================================================
function renderConfigList() {
  const parts = [
    {key:'cpu',label:'CPU 处理器',icon:'🔲'},
    {key:'gpu',label:'GPU 显卡',icon:'🎮'},
    {key:'mobo',label:'主板',icon:'📟'},
    {key:'ram',label:'内存',icon:'🧮'},
    {key:'storage',label:'硬盘',icon:'💾'},
    {key:'psu',label:'电源',icon:'⚡'},
    {key:'case',label:'机箱',icon:'🏠'},
    {key:'cooler',label:'散热器',icon:'❄️'},
  ];

  let rows = parts.map(p => {
    const sel = state[p.key];
    if (!sel) return `<tr class="empty-row"><td class="category">${p.icon} ${p.label}</td><td colspan="3">— 未选择 —</td></tr>`;

    let spec = '';
    if (p.key === 'cpu') spec = `${sel.cores} | ${sel.tdp}W | ${sel.socket}`;
    if (p.key === 'gpu') spec = `${sel.vram}GB ${sel.vramType} | ${sel.busWidth}-bit | ${sel.bw} GB/s`;
    if (p.key === 'mobo') spec = `${sel.chipset} | ${sel.ramType.toUpperCase()} | ${sel.ff}`;
    if (p.key === 'ram') spec = `DDR${sel.type==='ddr5'?'5':'4'} | ${sel.speed}MHz | ${sel.capacity}GB`;
    if (p.key === 'storage') spec = `${sel.type.toUpperCase()} | ${(sel.capacity/1024).toFixed(1)}TB | ${sel.speed}`;
    if (p.key === 'psu') spec = `${sel.watt}W | ${sel.cert} | ${sel.modular}`;
    if (p.key === 'case') spec = `GPU≤${sel.gpuLen}mm | 散热≤${sel.coolerH}mm`;
    if (p.key === 'cooler') spec = `解热${sel.tdpMax}W | ${sel.type}`;

    // 多平台价格链接
    let priceLinks = '';
    if (sel._platformPrices) {
      const platforms = Object.entries(sel._platformPrices);
      if (platforms.length > 0) {
        priceLinks = '<div class="price-links">' +
          platforms.slice(0, 3).map(([pKey, info]) => {

            const link = info.url ? info.url : '#';
            return `<a href="${link}" target="_blank" class="price-link-btn" title="${info.shop || label}">${label} ¥${info.price}</a>`;

  document.getElementById('config-list').innerHTML = `

function renderPerformance() {
  if (!state.gpu || !state.cpu) {
    document.getElementById('perf-content').innerHTML =
      '<p class="section-desc" style="text-align:center;padding:40px">请先在左侧选择 <strong>CPU</strong> 和 <strong>GPU</strong> 后再查看性能评估</p>';
    return;
  }

  const gpu = state.gpu;
  const cpu = state.cpu;
  const pf = gpu.perf; // Relative performance factor

  // CPU bottleneck at 1080p
  const cpuBottleneck = cpu.tier === 'entry' ? 0.85 : cpu.tier === 'mid' ? 0.95 : 1.0;

  let gameCards = Object.entries(GAME_BASELINE).map(([key, g]) => {
    const fps1080 = Math.round(g.qhd * pf * g.fhd * cpuBottleneck);
    const fps1440 = Math.round(g.qhd * pf);
    const fps4k = Math.round(g.qhd * pf * g.uhd);

    const rate = (fps) => {
      if (fps >= 144) return ['⚡ 电竞级','rating-s'];
      if (fps >= 90) return ['✅ 非常流畅','rating-a'];
      if (fps >= 60) return ['👍 流畅','rating-b'];
      if (fps >= 45) return ['⚠️ 可玩','rating-c'];
      if (fps >= 30) return ['🔶 勉强','rating-d'];
      return ['❌ 不可玩','rating-f'];
    };
    const r1080 = rate(fps1080), r1440 = rate(fps1440), r4k = rate(fps4k);

    // Recommendation
    let rec = '';
    if (fps4k >= 60) rec = '✨ 推荐 4K 高画质体验';
    else if (fps1440 >= 90) rec = '✨ 推荐 2K 高刷体验';
    else if (fps1080 >= 144) rec = '✨ 推荐 1080p 电竞体验';
    else if (fps1080 >= 60) rec = '👍 1080p 流畅可玩';
    else rec = '⚠️ 建议降低画质设置';

    return `<div class="perf-card">
      <h3>${g.name}</h3>
      <div style="font-size:.7rem;color:var(--text-muted);margin-bottom:6px">${g.preset}</div>
      <table>
        <tr><th></th><th>1080p</th><th>2K (1440p)</th><th>4K</th></tr>
        <tr>
          <td style="text-align:left">帧率</td>
          <td>${fps1080}</td><td>${fps1440}</td><td>${fps4k}</td>
        </tr>
        <tr>
          <td style="text-align:left">体验</td>
          <td><span class="rating ${r1080[1]}">${r1080[0]}</span></td>
          <td><span class="rating ${r1440[1]}">${r1440[0]}</span></td>
          <td><span class="rating ${r4k[1]}">${r4k[0]}</span></td>
        </tr>
      </table>
      <div class="rec">${rec}</div>
    </div>`;
  }).join('');

  // ---- AI Performance (Quantization-Aware) ----
  const vram = gpu.vram;
  const bw = gpu.bw;
  const tflops = gpu.tflops || (bw * 0.06); // rough estimate if tflops not available

  // Build model data with deployment info
  let modelData = AI_MODELS.map(m => {
    let bestQuant = null, bestVram = 0;
    if (vram >= m.q4 * 1.2) { bestQuant = 'q4'; bestVram = m.q4; }
    else if (vram >= m.q6 * 1.2) { bestQuant = 'q6'; bestVram = m.q6; }
    else if (vram >= m.q3 * 1.2) { bestQuant = 'q3'; bestVram = m.q3; }
    else if (vram >= m.iq3 * 1.2) { bestQuant = 'iq3'; bestVram = m.iq3; }
    else if (vram >= m.q2 * 1.2) { bestQuant = 'q2'; bestVram = m.q2; }
    else if (vram >= m.q8 * 1.2) { bestQuant = 'q8'; bestVram = m.q8; }
    const qi = QUANT_LEVELS.find(q => q.key === bestQuant);
    const quality = bestQuant ? (qi?.stars || 0) : 0;
    const tokSpeed = bestQuant ? Math.round(bw * 0.75 / (bestVram || 1)) : 0;
    return { ...m, bestQuant, bestVram, quality, tokSpeed, qi };
  });

  // Store for filtering
  window._modelData = modelData;

  // Find a good reference model for speed calculation
  const ref7B = AI_MODELS.find(m => m.params >= 7 && m.params <= 8);
  const ref14B = AI_MODELS.find(m => m.params >= 13 && m.params <= 14);
  const ref32B = AI_MODELS.find(m => m.params >= 32 && m.params <= 34);

  // Token speed estimation (memory-bandwidth bound for decode)
  // Formula: tok/s ≈ bandwidth * 0.75 / model_GB (real-world utilization ~75%)
  // Prefill (prompt processing) is compute-bound: ~ tflops / (params * 1.5) * 1000
  const tok7B = ref7B && vram >= ref7B.q4 * 1.2 ? Math.round(bw * 0.75 / ref7B.q4) : null;
  const tok14B = ref14B && vram >= ref14B.q4 * 1.2 ? Math.round(bw * 0.75 / ref14B.q4) : null;
  const tok32B = ref32B && vram >= ref32B.q4 * 1.2 ? Math.round(bw * 0.75 / (ref32B.q4 || 20)) : null;
  const prefillSpeed7B = Math.round(tflops * 1000 / (7 * 1.5));

  const aiHTML = `

        <div style="margin-top:4px;font-size:.7rem;color:var(--text-muted)">
          量化: <span style="color:#3fb950">Q4_K_M=推荐</span> | <span style="color:#d2991d">Q3_K_M=压缩</span> | <span style="color:#f0883e">IQ3_XXS=极限</span> | <span style="color:#f85149">Q2_K=极致</span>
        </div>
      </div>
    </div>
    <div class="ai-models" style="margin-top:14px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
        <span style="font-size:.7rem;color:var(--text-muted)">排序:</span>
        <select id="ai-sort" onchange="renderAITable()" style="background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:.7rem">
          <option value="size-asc">参数量 ↑</option>
          <option value="size-desc">参数量 ↓</option>
          <option value="speed-desc">速度最快</option>
          <option value="quality-desc" selected>推荐优先</option>
          <option value="family">按系列</option>
        </select>
        <span style="font-size:.7rem;color:var(--text-muted)">筛选:</span>
        <select id="ai-filter" onchange="renderAITable()" style="background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:.7rem">
          <option value="all">全部模型</option>
          <option value="deployable" selected>仅可部署</option>
          <option value="quality">推荐质量 (Q4/Q6/Q8)</option>
          <option value="family-deepseek">DeepSeek系列</option>
          <option value="family-qwen">Qwen系列</option>
          <option value="family-llama">Llama系列</option>
          <option value="family-mistral">Mistral系列</option>
          <option value="family-other">其他系列</option>
        </select>
        <span style="font-size:.65rem;color:var(--text-muted);margin-left:auto" id="ai-count"></span>
      </div>
      <div style="max-height:420px;overflow-y:auto">
        <table style="font-size:.73rem" id="ai-table">
          <thead><tr><th>模型</th><th>参数</th><th>推荐量化</th><th>生成速度</th><th>推荐</th></tr></thead>
          <tbody id="ai-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="ai-speed">
      <div>⚡ <strong>7B Q4_K_M 生成速度:</strong> ${tok7B ? `<strong>~${tok7B} tok/s</strong>` : '<span style="color:var(--text-muted)">显存不足</span>'} (内存带宽瓶颈)</div>
      <div>⚡ <strong>14B Q4_K_M 生成速度:</strong> ${tok14B ? `<strong>~${tok14B} tok/s</strong>` : '<span style="color:var(--text-muted)">显存不足</span>'}</div>
      <div>⚡ <strong>32B Q4_K_M 生成速度:</strong> ${tok32B ? `<strong>~${tok32B} tok/s</strong>` : '<span style="color:var(--text-muted)">显存不足</span>'}</div>
      <div>📥 <strong>Prompt 处理:</strong> ~${prefillSpeed7B.toLocaleString()} tok/s (7B, 计算瓶颈)</div>
      <div style="margin-top:8px;font-size:.75rem;color:var(--text-secondary)">
        💡 公式: 生成速度 = 带宽 × 0.75 ÷ 模型VRAM占用 | Prompt处理 = 算力 ÷ 模型计算量<br>
        推荐: Ollama + Open WebUI | ${vram >= 24 ? '✅ 24GB+ 可运行 32B Q4 + 长上下文' : vram >= 16 ? '✅ 16GB 可运行 14B Q4 流畅' : vram >= 12 ? '⚠️ 12GB 可运行 8B 流畅，14B需极限量化' : '⚠️ 8GB 仅适合 7B 以下模型'}
      </div>
    </div>
  </div>`;

  // ---- Price Chart Section ----
  const chartHTML = `
  <div class="ai-card" style="margin-top:16px">

// ---- AI Table render with sort/filter ----
function renderAITable() {
  if (!window._modelData) return;
  const tbody = document.getElementById('ai-tbody');
  const countEl = document.getElementById('ai-count');
  if (!tbody) return;

  let data = [...window._modelData];
  const sortBy = document.getElementById('ai-sort')?.value || 'quality-desc';
  const filterBy = document.getElementById('ai-filter')?.value || 'all';

  // Filter
  if (filterBy === 'deployable') {
    data = data.filter(m => m.bestQuant);
  } else if (filterBy === 'quality') {
    data = data.filter(m => m.quality >= 4);
  } else if (filterBy.startsWith('family-')) {
    const fam = filterBy.replace('family-', '');
    if (fam === 'other') {
      const mainFamilies = ['DeepSeek','Qwen 3.5','Qwen 3','Qwen 2.5','Llama','Mistral'];
      data = data.filter(m => !mainFamilies.includes(m.family));
    } else if (fam === 'qwen') {
      data = data.filter(m => m.family && m.family.startsWith('Qwen'));
    } else {
      data = data.filter(m => m.family === fam.charAt(0).toUpperCase() + fam.slice(1));
    }
  }

  // Sort
  switch(sortBy) {
    case 'size-asc': data.sort((a,b) => a.params - b.params); break;
    case 'size-desc': data.sort((a,b) => b.params - a.params); break;
    case 'speed-desc': data.sort((a,b) => b.tokSpeed - a.tokSpeed); break;
    case 'quality-desc': data.sort((a,b) => b.quality - a.quality || b.params - a.params); break;
    case 'family': data.sort((a,b) => (a.family||'').localeCompare(b.family||'') || a.params - b.params); break;
  }

  if (countEl) countEl.textContent = `共 ${data.length} 款`;

  tbody.innerHTML = data.map(m => {
    const status = m.quality >= 4
      ? '<span class="ok">✅</span>'
      : m.bestQuant
        ? `<span class="warn" style="font-size:.65rem">⚠️ ${m.qi?.label||''}</span>`
        : '<span class="no">❌</span>';
    return `<tr>
      <td>${m.name}</td>
      <td style="font-size:.7rem;color:var(--text-muted)">${m.activeB ? m.params+'B/'+m.activeB+'B' : m.params+'B'}</td>
      <td>${m.bestQuant ? `<span style="color:${m.qi?.color||'#fff'}">${m.qi?.label||'—'}</span>` : '—'}</td>
      <td style="font-family:var(--font-mono);font-size:.75rem">${m.tokSpeed > 0 ? m.tokSpeed+' tok/s' : '—'}</td>
      <td>${status}</td>
    </tr>`;
  }).join('');
}

// Chart.js 价格趋势图 (fetch /api/trend)
let trendChartInstance = null;
async function loadTrendChart(cat, name) {
  const canvas = document.getElementById('trend-canvas');
  if (!canvas || typeof Chart === 'undefined') return;
  const ctx = canvas.getContext('2d');

  try {
    let data;
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      const resp = await fetch('/api/trend?type=' + cat + '&name=' + encodeURIComponent(name));
      if (resp.ok) data = await resp.json();
    }

    // Fallback: generate from prices.json
    if (!data?.trend?.length) {
      const prices = window._pricesData || {};
      const product = prices.parts?.[cat]?.find(p => p.name.includes(name));
      if (product) {
        const basePrice = product.best_price;
        const trend = [];
        for (let i = 30; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          trend.push({ date: d.toISOString().slice(0,10), price: Math.round(basePrice * (1 + (Math.random()-0.48)*0.1)) });
        }
        data = { trend };
      }
    }

    if (!data?.trend?.length) return;
    const trend = data.trend;

    if (trendChartInstance) trendChartInstance.destroy();
    trendChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: trend.map(d => d.date.slice(5)),
        datasets: [{
          label: name + ' (¥)',
          data: trend.map(d => d.price),
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(88,166,255,0.1)',
          fill: true, tension: 0.3, pointRadius: 2,
          pointBackgroundColor: '#58a6ff'
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: '#e6edf3', font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => '¥' + ctx.parsed.y.toLocaleString() } }
        },
        scales: {
          x: { ticks: { color: '#8b949e', font: { size: 9 }, maxTicksLimit: 10 }, grid: { color: '#21262d' } },
          y: { ticks: { color: '#8b949e', callback: v => '¥' + v.toLocaleString() }, grid: { color: '#21262d' } }
        }
      }
    });
  } catch(e) { console.log('Trend chart:', e.message); }
}

function exportConfig() {
  const parts = ['cpu','gpu','mobo','ram','storage','psu','case','cooler'];
  const lines = parts.map(p => {
    const sel = state[p];
    if (!sel) return `- ${p}: 未选择`;
    return `- ${p}: ${sel.name} (¥${sel.price})`;
  });
  const total = parts.reduce((s, p) => s + (state[p] ? state[p].price : 0), 0);
  lines.push(`\n总价: ¥${total.toLocaleString()}`);
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    alert('✅ 配置清单已复制到剪贴板！');
  }).catch(() => {
    prompt('手动复制配置清单:', text);
  });
}

function buildSidebar() {
  const container = document.getElementById('sections');
  let html = '';
  SECTIONS.forEach(s => {
    const filterHtml = s.filters.map(f => `
      <div style="margin-bottom:4px">
        <span style="font-size:.7rem;color:var(--text-muted);margin-right:4px">${f.label}:</span>
        ${f.opts.map(([val,label]) =>
          `<button class="filter-btn${val==='all'?' active':''}" data-val="${val}" onclick="setFilter('${s.key}','${f.key}','${val}')">${label}</button>`
        ).join('')}
      </div>
    `).join('');

    html += `
    <div class="section" id="section-${s.key}">
      <div class="section-header" onclick="toggleSection('${s.key}')">
        <span class="icon">${s.icon}</span> ${s.label}
        <span class="selected-badge"></span>
        <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="section-body-inner">
          <div class="filter-row">${filterHtml}</div>
          <div class="comp-list"></div>
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function toggleSection(key) {
  const body = document.querySelector(`#section-${key} .section-body`);
  const arrow = document.querySelector(`#section-${key} .arrow`);
  body.classList.toggle('collapsed');
  arrow.style.transform = body.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0deg)';
}

// =====================================================================
// TABS
// =====================================================================
document.addEventListener('DOMContentLoaded', async () => {
  buildSidebar();
  renderAll();
  showRefreshButton();
  await loadPrices();

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
      document.getElementById('panel-' + tab).style.display = 'block';
      if (tab === 'perf') renderPerformance();
    });
  });
});
